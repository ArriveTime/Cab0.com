<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- CRUCIAL VIEWPORT TAG: Instructs smartphones to autosize correctly -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cab0.com — Every Ride. Every Delivery. One Search.</title>
    <style>
        :root { 
            --cab0-blue: #3b82f6; 
            --cab0-yellow: #FACC15; 
            --serif: 'DM Serif Display', serif; 
            --sans: 'DM Sans', sans-serif; 
            --fancy: 'Playfair Display', serif; 
        }

        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
        }

        html, body { 
            background-color: #000000 !important; 
            color: #ffffff; 
            font-family: var(--sans);
            min-height: 100vh;
            overflow-x: hidden;
            width: 100%;
        }

        /* FLEXIBLE LAYOUT CONTAINER: Automatically frames layout on all devices */
        .content-wrapper { 
            width: 100%;
            max-width: 600px; /* Slightly wider than original for enhanced reading layout */
            margin: 0 auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* NAVIGATION SYSTEM */ 
        .nav-bar { 
            display: flex; 
            justify-content: center; 
            gap: 8px; 
            padding: 20px 0; 
            background: #000000; 
        } 
        .nd { 
            width: 8px; 
            height: 8px; 
            border-radius: 50%; 
            background: #222; 
        } 
        .nd.on { 
            width: 24px; 
            border-radius: 4px; 
            background: var(--cab0-yellow); 
        }

        .page { display: none; } 
        .page.active { display: block; }

        /* BRANDING INTERFACE */ 
        .p1-body { 
            text-align: center; 
            padding-bottom: 40px;
        } 
        .logo-main { 
            font-family: var(--serif); 
            font-size: 42px; 
            color: var(--cab0-blue); 
            margin-bottom: 25px; 
            font-weight: 700;
        } 
        .logo-main span { color: var(--cab0-yellow); }

        /* STEVE WOZNIAK APPRECIATION QUOTE BOX */ 
        .woz-box { 
            margin-bottom: 40px; 
            padding: 15px; 
            background: #0d0d0d;
            border-radius: 12px;
            border: 1px solid #1a1a1a;
        } 
        .woz-quote { 
            font-family: var(--fancy); 
            font-style: italic; 
            font-size: 20px; 
            color: var(--cab0-yellow); 
            line-height: 1.4; 
            margin-bottom: 10px; 
        } 
        .woz-attribution { 
            display: block; 
            font-family: var(--sans); 
            font-size: 11px; 
            font-weight: 700; 
            text-transform: uppercase; 
            letter-spacing: 1.2px; 
            color: var(--cab0-yellow); 
            opacity: 0.8; 
        }

        h1 { 
            font-family: var(--serif); 
            font-size: 38px; 
            line-height: 1.15; 
            margin-bottom: 30px; 
            color: #fff; 
            text-align: center; 
        } 
        h1 em { 
            color: var(--cab0-yellow); 
            font-style: normal; 
        }

        /* GRID: Flexible 2-column pattern that accommodates expanding sets smoothly */ 
        .cats-grid { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 14px; 
            margin-bottom: 35px; 
            text-align: center; 
            width: 100%;
        } 
        .cat { 
            background: #111; 
            border: 1px solid #222; 
            border-radius: 14px; 
            padding: 22px 10px; 
            cursor: pointer; 
            transition: all 0.2s ease;
        } 
        .cat.on { 
            background: var(--cab0-yellow); 
            border-color: var(--cab0-yellow); 
        } 
        .cat.on .cat-label { 
            color: #000; 
        } 
        .cat-label { 
            font-size: 14px; 
            font-weight: 700; 
            color: #aaa; 
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* CTA ACTIONS */ 
        .main-btn { 
            background: var(--cab0-yellow); 
            color: #000; 
            padding: 18px; 
            border-radius: 14px; 
            text-align: center; 
            font-weight: 800; 
            font-size: 18px; 
            cursor: pointer; 
            text-transform: uppercase;
            letter-spacing: 0.5px;
            box-shadow: 0 4px 15px rgba(250, 204, 21, 0.2);
        }

        /* DYNAMIC RESPONSIVE LISTING CARDS */ 
        .sort-strip { 
            display: flex; 
            background: #000; 
            padding: 15px 0; 
            gap: 8px; 
            position: sticky; 
            top: 0; 
            z-index: 90; 
        } 
        .sort-btn { 
            flex: 1; 
            padding: 14px; 
            border-radius: 8px; 
            border: 1px solid #222; 
            font-size: 11px; 
            font-weight: 800; 
            background: #000; 
            color: #888; 
            cursor: pointer; 
            text-transform: uppercase;
        } 
        .sort-btn.active { 
            background: var(--cab0-yellow); 
            color: #000; 
            border-color: var(--cab0-yellow); 
        } 
        
        .pcard { 
            background: #111; 
            border-radius: 15px; 
            border: 1px solid #222; 
            padding: 18px; 
            margin-bottom: 12px; 
            display: flex; 
            align-items: center; 
            gap: 15px; 
            cursor: pointer; 
            text-align: left; 
            width: 100%;
        } 
        .pcard.sel { 
            border: 2px solid var(--cab0-yellow); 
            background: #0a0a0a; 
        }
        .pcard-logo {
            width: 45px;
            height: 45px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            color: #fff;
            font-size: 18px;
        }

        /* BOTTOM STICKY BAR FOR FLUID SCREENS */
        .p3-footer { 
            position: fixed; 
            bottom: 0; 
            left: 50%; 
            transform: translateX(-50%); 
            width: 100%; 
            max-width: 600px; 
            background: rgba(0,0,0,0.95); 
            border-top: 1px solid #222; 
            padding: 20px; 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            z-index: 1000; 
            backdrop-filter: blur(10px);
        } 
        .open-btn { 
            background: var(--cab0-yellow); 
            color: #000; 
            padding: 14px 24px; 
            border-radius: 12px; 
            text-decoration: none; 
            font-weight: 800; 
            font-size: 16px; 
            text-align: center; 
            text-transform: uppercase;
        } 
    </style>
</head>
<body>

    <div class="content-wrapper">
        
        <!-- INTRO HOME PANEL -->
        <div class="page active" id="pg0">
            <div class="p1-body">
                <div class="logo-main">Cab<span>0</span>.com</div>
                
                <div class="woz-box">
                    <p class="woz-quote">"Best of luck to you on this worthy venture, its your turn"</p>
                    <span class="woz-attribution">Steve Wozniak, Apple Co-Founder</span>
                </div>

                <h1>Every ride.<br>Every delivery.<br><em>One search.</em></h1>

                <div class="cats-grid">
                    <div class="cat on" onclick="pickCat(this, 'ride')"><div class="cat-label">Rideshare</div></div>
                    <div class="cat" onclick="pickCat(this, 'loop')"><div class="cat-label">Vegas Loop</div></div>
                    <div class="cat" onclick="pickCat(this, 'robotaxi')"><div class="cat-label">Robotaxi</div></div>
                    <div class="cat" onclick="pickCat(this, 'delivery')"><div class="cat-label">App Delivery</div></div>
                </div>
                <div class="main-btn" onclick="goTo(1)">Find Best Rate →</div>
            </div>
        </div>

        <!-- ADDRESS CONFIRMATION MODAL INTERACTION -->
        <div class="page" id="pg1">
            <div style="padding: 20px 0;">
                <h2 style="color:#fff; margin-bottom:20px; font-family: var(--serif); font-size: 32px;">Confirm Location</h2>
                <input type="text" placeholder="Enter Destination address or resort name..." style="width:100%; background:#111; border:1px solid #333; color:#fff; padding:18px; border-radius:12px; font-size:16px; margin-bottom:25px; outline: none; transition: border 0.2s;" onfocus="this.style.borderColor='var(--cab0-blue)'">
                <div class="main-btn" onclick="goTo(2)">Compare Rates →</div>
            </div>
        </div>

        <!-- REVENUE GENERATION ENGINE COMPARISON RESULTS -->
        <div class="page" id="pg2">
            <div class="sort-strip">
                <button class="sort-btn active" id="sort-price" onclick="setSort('price')">CHEAPEST</button>
                <button class="sort-btn" id="sort-time" onclick="setSort('time')">FASTEST</button>
            </div>
            
            <!-- Target list for dynamic javascript outputs. Extra bottom padding prevents text clipping from footer bar -->
            <div style="padding: 10px 0 140px;" id="p3-grid"></div>
            
            <div class="p3-footer">
                <div style="text-align: left;">
                    <div id="sel-name" style="font-weight:800; color:#fff; font-size: 16px;">Select Service</div>
                    <div style="font-size:12px; color:#888; margin-top: 2px;">Secure Official Booking Link</div>
                </div>
                <a href="#" id="final-link" target="_blank" class="open-btn">Book Now</a>
            </div>
        </div>

    </div>

    <script> 
        var currentCat = 'ride', currentSort = 'price', selectedId = null; 

        // ALL DEEP LINKS MAP DIRECTLY TO REGISTRATION GATEWAYS NATIVELY
        var LINKS = { 
            'uber': 'https://m.uber.com', 
            'lyft': 'https://www.lyft.com', 
            'vegas_loop': 'https://www.boringcompany.com/loop', 
            'zoox': 'https://zoox.com',
            'waymo': 'https://waymo.com', 
            'doordash': 'https://www.doordash.com', 
            'ubereats': 'https://www.ubereats.com', 
            'grubhub': 'https://www.grubhub.com',
            'instacart': 'https://www.instacart.com',
            'amazon_flex': 'https://flex.amazon.com'
        }; 

        // INTEGRATED NEW METROPOLITAN SERVICES AND REAL-TIME TIMINGS
        var PROVIDERS = { 
            ride: [ 
                { id:'uber', name:'Uber X', s:'Ub', c:'#111111', price:12.50, time:4 }, 
                { id:'lyft', name:'Lyft Ride', s:'Ly', c:'#FF00BF', price:11.20, time:6 }
            ], 
            loop: [ 
                { id:'vegas_loop', name:'Vegas Loop (Tesla Tunnel)', s:'TL', c:'#000000', price:4.50, time:2 }
            ],
            robotaxi: [
                { id:'zoox', name:'Zoox Autonomous Cab', s:'Zx', c:'#2c3e50', price:0.00, time:7 },
                { id:'waymo', name:'Waymo Driverless', s:'Wy', c:'#00D1B2', price:9.00, time:9 }
            ],
            delivery: [ 
                { id:'doordash', name:'DoorDash Delivery', s:'DD', c:'#FF3008', price:2.99, time:22 }, 
                { id:'ubereats', name:'Uber Eats Order', s:'UE', c:'#06C167', price:3.49, time:18 }, 
                { id:'grubhub', name:'Grubhub Courier', s:'GH', c:#F97316, price:3.99, time:28 },
                { id:'instacart', name:'Instacart Grocery', s:'IC', c:'#00AD31', price:4.99, time:45 },
                { id:'amazon_flex', name:'Amazon Flex Courier', s:'Az', c:'#FF9900', price:0.00, time:60 }
            ] 
        }; 

        function goTo(n) { 
            document.querySelectorAll('.page').forEach((p, i) => p.classList.toggle('active', i === n)); 
            if (n === 2) renderProviders(); 
            window.scrollTo(0,0); 
        } 

        function pickCat(el, cat) { 
            document.querySelectorAll('.cat').forEach(c => c.classList.remove('on')); 
            el.classList.add('on'); 
            currentCat = cat; 
            selectedId = null; 
        } 

        function setSort(type) { 
            currentSort = type; 
            document.querySelectorAll('.sort-btn').forEach(b => b.classList.toggle('active', b.id === 'sort-'+type)); 
            renderProviders(); 
        } 

        function renderProviders() { 
            var list = [...PROVIDERS[currentCat]].sort((a,b) => a[currentSort] - b[currentSort]); 
            if (list.length > 0 && !selectedId) selectProvider(list[0].id); 
            
            var html = ''; 
            list.forEach(p => { 
                var activeClass = p.id === selectedId ? 'sel' : '';
                var displayPrice = p.price === 0 ? "FREE" : `$${p.price.toFixed(2)}`;
                
                html += `
                    <div class="pcard ${activeClass}" onclick="selectProvider('${p.id}')">
                        <div class="pcard-logo" style="background:${p.c}">${p.s}</div>
                        <div style="flex:1;">
                            <div style="font-weight:700; color:#fff; font-size:16px;">${p.name}</div>
                            <div style="font-size:13px; color:#666; margin-top:2px;">${p.time} min response time</div>
                        </div>
                        <div style="font-weight:800; color:var(--cab0-yellow); font-size:18px;">${displayPrice}</div>
                    </div>
                `; 
            }); 
            document.getElementById('p3-grid').innerHTML = html; 
        } 

        function selectProvider(id) { 
            selectedId = id; 
            var p = Object.values(PROVIDERS).flat().find(x => x.id === id); 
            if(p) { 
                document.getElementById('sel-name').textContent = p.name; 
                document.getElementById('final-link').href = LINKS[id] || '#'; 
                renderProviders(); 
            } 
        } 
    </script>
</body>
</html>
